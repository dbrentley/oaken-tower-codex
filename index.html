<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Oaken Tower Codex</title>
<style>
  :root {
    --bg: #0e1014;
    --bg2: #161922;
    --bg3: #1f2330;
    --fg: #e6e9ef;
    --fg-mute: #99a0b0;
    --accent: #6cb2ff;
    --border: #2a3040;
    --row-hover: #1b1f2c;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font: 13px/1.4 -apple-system, Segoe UI, Inter, sans-serif; }
  header { position: sticky; top: 0; z-index: 10; background: var(--bg2); border-bottom: 1px solid var(--border); padding: 8px 16px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  header h1 { font-size: 14px; margin: 0; font-weight: 600; letter-spacing: 0.3px; color: var(--fg); }
  header h1 .ver { color: var(--fg-mute); font-weight: 400; margin-left: 6px; }
  .tabs { display: flex; gap: 4px; }
  .tabs button { background: transparent; color: var(--fg-mute); border: 1px solid var(--border); padding: 4px 12px; border-radius: 4px; cursor: pointer; font: inherit; }
  .tabs button:hover { background: var(--bg3); color: var(--fg); }
  .tabs button.active { background: var(--accent); color: #0e1014; border-color: var(--accent); font-weight: 600; }
  .tab-section { display: none; padding: 8px 16px 32px; }
  .tab-section.active { display: block; }
  .controls { display: flex; gap: 8px; align-items: center; padding: 10px 0; flex-wrap: wrap; position: sticky; top: 45px; background: var(--bg); z-index: 5; box-shadow: 0 1px 0 var(--border); }
  .controls input[type=search] { background: var(--bg2); border: 1px solid var(--border); color: var(--fg); padding: 6px 10px; border-radius: 4px; min-width: 220px; font: inherit; }
  .tier-toggle { display: flex; gap: 4px; }
  .tier-toggle button {
    background: var(--bg2); border: 1px solid var(--border);
    padding: 4px 8px; border-radius: 999px; cursor: pointer;
    user-select: none; display: inline-flex; align-items: center; gap: 2px;
    height: 28px; min-width: 60px; justify-content: center;
  }
  .tier-toggle button.active { background: var(--accent); border-color: var(--accent); }
  .tier-toggle button:hover:not(.active) { border-color: #3d4658; }
  .tier-toggle button img {
    width: 14px; height: 14px; image-rendering: pixelated;
    filter: grayscale(0.6) opacity(0.6);
  }
  .tier-toggle button img.tier-grey { filter: grayscale(1) brightness(1.3) !important; }
  .tier-toggle button.active img { filter: none; }
  .tier-toggle button.active img.tier-grey { filter: grayscale(1) brightness(1.4) !important; }

  /* Tag chips and inline row tags share the same look: the game's spr_typeXxx
     pill sprite as background. Use the same dimensions in both places so the
     filter chips visually match the row tags. */
  .chip-row { display: flex; gap: 4px; flex-wrap: wrap; }
  .chip, .tag {
    display: inline-flex; align-items: center; justify-content: center;
    width: 70px; height: 20px; vertical-align: middle;
    background-color: transparent;
    background-size: 100% 100%; background-repeat: no-repeat;
    color: #f5f7fb; font: 600 10px/1 inherit;
    text-shadow: 0 0 3px rgba(0,0,0,0.7); image-rendering: pixelated;
    border: none; outline: none; padding: 0;
    -webkit-appearance: none; appearance: none;
  }
  .tag { margin-right: 3px; }
  .chip { cursor: pointer; user-select: none; opacity: 0.4; transition: opacity 0.1s; }
  .chip:hover { opacity: 0.8; }
  .chip.active { opacity: 1; }
  /* When "All" is selected, every chip is full opacity */
  .chip-row.show-all .chip { opacity: 1; }
  .chip[data-tag="Frosty"],  .tag.Frosty  { background-image: url("sprites/spr_typeFrosty.png"); }
  .chip[data-tag="Dark"],    .tag.Dark    { background-image: url("sprites/spr_typeDark.png"); }
  .chip[data-tag="Arcane"],  .tag.Arcane  { background-image: url("sprites/spr_typeArcane.png"); }
  .chip[data-tag="Crystal"], .tag.Crystal { background-image: url("sprites/spr_typeCrystal.png"); }
  .chip[data-tag="Holy"],    .tag.Holy    { background-image: url("sprites/spr_typeHoly.png"); }
  .chip[data-tag="Elven"],   .tag.Elven   { background-image: url("sprites/spr_typeElven.png"); }
  .chip[data-tag="Moon"],    .tag.Moon    { background-image: url("sprites/spr_typeMoon.png"); }
  .chip[data-tag="Flame"],   .tag.Flame   { background-image: url("sprites/spr_typeFlame.png"); }
  .chip[data-tag="Storm"],   .tag.Storm   { background-image: url("sprites/spr_typeStorm.png"); }
  .chip[data-tag="Witch"],   .tag.Witch   { background-image: url("sprites/spr_typeWitch.png"); }
  .chip[data-tag="Dragon"],  .tag.Dragon  { background-image: url("sprites/spr_typeDragon.png"); }
  .chip[data-tag="Neutral"], .tag.Neutral { background-image: url("sprites/spr_typeNeutral.png"); color: #1a1a1a; text-shadow: none; }
  /* Wiki-fallback tags: dimmed and with dashed outline so the user knows the
     pool membership is from the wiki (not binary-canonical). Hover for note. */
  .tag.wiki-only { opacity: 0.55; outline: 1px dashed rgba(255,255,255,0.35); outline-offset: -2px; cursor: help; }

  /* === In-game-style hover tooltip ===
     Mimics the Oaken Tower item tooltip: brown card with ornate gold border,
     centered title, rarity-colored subtitle, primary stats (CD + DMG), secondary
     stat icons (only non-zero), ability text, weapon-type + tag pills at bottom. */
  td.name { cursor: help; }
  /* spr_encounterTooltip is 188x300. Measured non-stretchable border insets:
       top=19, right=6, bottom=15, left=7 (native source pixels).
     Use border-image so corners + edges render at native pixel-art size (with
     image-rendering: pixelated) and only the center brown body stretches.
     border-image-repeat: round = edge tiles repeat without distortion. */
  /* Tooltip background: spr_encounterTooltip (188×300 native) rendered as a
     CSS border-image at 2× pixel-art scale.
     Slice values capture the full corner ornament (curly-Q gold filigree),
     not just the brown-body edge — measured by extracting and visually
     verifying corner crops at varying inset depths.
        top=28, right=18, bottom=22, left=14 (native source pixels).
     - border-width = slice × 2 ⇒ corners render at exactly 2× source size
       (each source pixel = 2×2 screen pixels, no scaling distortion).
     - Tooltip width = 188 × 2 = 376px so the top/bottom edge stretches by an
       exact 2× factor (clean integer-scale pixel art with no skew).
     - border-image-repeat: stretch repeat
         · top + bottom edges stretched (centered gold crest stays a single crest)
         · left + right edges TILE VERTICALLY — the gold-rope slice tiles cleanly
           so the box can grow to any height without distorting edge art.
     - Center brown body fills whatever height the content needs. */
  #item-tooltip {
    position: fixed; pointer-events: none; display: none;
    width: 376px; box-sizing: border-box;
    border-style: solid;
    border-width: 56px 36px 44px 28px;
    border-image-source: url("sprites/spr_encounterTooltip.png");
    border-image-slice: 28 18 22 14 fill;
    border-image-repeat: stretch repeat;
    image-rendering: pixelated;
    padding: 8px 12px 10px;
    z-index: 1000;
    color: #f5f7fb; font: 13px/1.4 -apple-system, Segoe UI, Inter, sans-serif;
    text-align: center;
    background-color: transparent;
  }
  #item-tooltip.visible { display: block; }
  .tt-title { font: 700 22px/1.1 "Cinzel", Georgia, serif; color: #f5f7fb; margin-bottom: 4px; }
  .tt-rarity { font: 700 13px/1 "Cinzel", Georgia, serif; margin-bottom: 12px; letter-spacing: 0.3px; }
  .tt-rarity.common { color: #d4d4d4; }
  .tt-rarity.rare { color: #6cb2ff; }
  .tt-rarity.epic { color: #c878ff; }
  .tt-rarity.legendary { color: #ffa84d; }
  .tt-rarity.forged { color: #ff5a4a; }
  .tt-rarity.cursed { color: #b48bff; }
  .tt-rarity.special { color: #4ad29c; }
  .tt-divider { height: 1px; background: rgba(255,255,255,0.18); margin: 8px 0; }
  .tt-primary { display: flex; justify-content: space-around; align-items: center; gap: 16px; margin: 8px 0; }
  .tt-primary .tt-stat { display: flex; align-items: center; gap: 6px; font: 700 18px/1 inherit; color: #c8f084; }
  .tt-primary img { width: 24px; height: 24px; image-rendering: pixelated; }
  .tt-stats { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px 14px; margin: 6px 0; }
  .tt-stats .tt-stat { display: inline-flex; align-items: center; gap: 4px; font: 700 13px/1 inherit; color: #c8f084; }
  .tt-stats img { width: 20px; height: 20px; image-rendering: pixelated; }
  .tt-ability { color: #c8f084; font: 12px/1.4 inherit; padding: 4px 6px 6px; }
  .tt-ability.empty { color: rgba(200,240,132,0.5); font-style: italic; }
  .tt-pills { display: flex; justify-content: center; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
  .tt-pill {
    display: inline-flex; align-items: center; justify-content: center;
    width: 78px; height: 22px; padding: 0;
    background-size: 100% 100%; background-repeat: no-repeat;
    background-color: transparent;
    color: #f5f7fb; font: 700 11px/1 inherit;
    text-shadow: 0 0 3px rgba(0,0,0,0.7); image-rendering: pixelated;
  }
  /* Weapon-type pill: use the neutral-tinted parchment (typeNeutral has a
     warm cream fill that reads as "wooden plate" against the brown bg). */
  .tt-pill.weapon { background-image: url("sprites/spr_typeNeutral.png"); color: #1a1a1a; text-shadow: none; }
  /* Tag pills inherit their colored pill backgrounds from the .tag.<Tag> rules above */
  .chip[data-tag=""] {
    background-image: none; background: transparent;
    border: 1px solid var(--border); border-radius: 999px;
    color: var(--fg-mute); text-shadow: none;
  }
  .chip[data-tag=""].active {
    background: var(--accent); color: #0e1014;
    border-color: var(--accent); font-weight: 700;
  }
  .count { color: var(--fg-mute); font-size: 12px; margin-left: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { text-align: left; background: var(--bg2); position: sticky; top: 96px; padding: 6px 8px; border-bottom: 1px solid var(--border); font-weight: 600; cursor: pointer; user-select: none; white-space: nowrap; }
  thead th:hover { background: var(--bg3); }
  thead th.sorted-asc::after { content: " ↑"; color: var(--accent); }
  thead th.sorted-desc::after { content: " ↓"; color: var(--accent); }
  tbody tr { border-bottom: 1px solid var(--border); }
  tbody tr:hover { background: var(--row-hover); }
  tbody td { padding: 4px 8px; vertical-align: middle; }
  td.icon { width: 40px; padding: 2px 4px 2px 8px; }
  td.icon img { display: block; width: 32px; height: 32px; image-rendering: pixelated; }
  td.icon .ph { width: 32px; height: 32px; background: var(--bg3); border-radius: 4px; }
  td.name { font-weight: 600; min-width: 120px; }
  td.name .obj { color: var(--fg-mute); font-weight: 400; font-size: 11px; font-family: ui-monospace, monospace; display: block; }
  td.tags { white-space: nowrap; }
  /* Inline row tag — dot + text, colors sampled from the game pill sprites */
  .tag { display: inline-flex; align-items: center; gap: 4px;
         font: 600 10px/1 inherit; color: var(--fg-mute);
         margin-right: 6px; vertical-align: middle; }
  .tag::before { content: ""; width: 7px; height: 7px; border-radius: 50%;
                 box-shadow: 0 0 0 1px rgba(0,0,0,0.4); }
  .tag.Frosty::before   { background: rgb(0,255,255); }
  .tag.Dark::before     { background: rgb(40,40,40); box-shadow: 0 0 0 1px rgba(255,255,255,0.4); }
  .tag.Arcane::before   { background: rgb(102,45,145); }
  .tag.Crystal::before  { background: rgb(255,0,150); }
  .tag.Holy::before     { background: rgb(255,242,0); }
  .tag.Elven::before    { background: rgb(178,255,178); }
  .tag.Moon::before     { background: rgb(137,152,229); }
  .tag.Flame::before    { background: rgb(238,28,36); }
  .tag.Storm::before    { background: rgb(73,153,136); }
  .tag.Witch::before    { background: rgb(189,140,191); }
  .tag.Neutral::before  { background: rgb(242,219,181); }
  .rarity { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 4px; vertical-align: middle; font-weight: 600; }
  .rarity.common { background: #c9cdd6; color: #0e1014; }
  .rarity.rare { background: #5b8def; color: #0e1014; }
  .rarity.epic { background: #b48bff; color: #0e1014; }
  .rarity.legendary { background: #ff9d3a; color: #0e1014; }
  .rarity.forged { background: #ff5a4a; color: #0e1014; }
  .rarity.cursed { background: #7a3aff; color: #f5f7fb; }
  .rarity.special { background: #4ad29c; color: #0e1014; cursor: help; border-bottom: 1px dotted #0e1014; }
  td.num { text-align: center; font-variant-numeric: tabular-nums; min-width: 32px; padding: 4px 4px; }
  td.num.cost { white-space: nowrap; min-width: 56px; }
  td.num.cost img { width: 14px; height: 14px; vertical-align: -3px; image-rendering: pixelated; margin-right: 2px; }
  /* Stat-icon column headers */
  th.stat-h { text-align: center; padding: 4px 4px; min-width: 32px; }
  th.stat-h img { width: 20px; height: 20px; vertical-align: middle; image-rendering: pixelated; }
  th.stat-h.text { font-size: 11px; color: var(--fg-mute); letter-spacing: 0.5px; }
  td.ability { color: var(--fg-mute); font-size: 12px; max-width: 600px; }
  td.ability b { color: var(--fg); }
  .empty { color: var(--fg-mute); }
  /* Potions / slot buffs / encounters */
  td.text-cell { color: var(--fg-mute); font-size: 12px; }
  td.text-cell ol { margin: 0; padding-left: 20px; }
  td.text-cell li:not(:last-child) { margin-bottom: 2px; }
  footer { color: var(--fg-mute); font-size: 11px; padding: 16px; border-top: 1px solid var(--border); text-align: center; }
</style>
</head>

<header>
  <h1>Oaken Tower Codex <span class="ver">v0.3.7</span></h1>
  <div class="tabs">
    <button data-tab="items" class="active">Items <span class="muted">159</span></button>
    <button data-tab="potions">Potions <span class="muted">66</span></button>
    <button data-tab="slots">Slot Buffs <span class="muted">19</span></button>
    <button data-tab="encounters">Encounters <span class="muted">231</span></button>

<section id="items" class="tab-section active">
  <div class="controls">
    <input type="search" id="items-search" placeholder="Search items…" autofocus>
    <div class="tier-toggle" id="tier-toggle">

      <button data-tier="1" title="Tier 2 stats"><img src="sprites/spr_star.png"></button>

        <th data-sort="shock" class="stat-h" title="Shock"><img src="sprites/spr_iconShock.png"></th>
        <th data-sort="block" class="stat-h" title="Block / Shield"><img src="sprites/spr_iconShield.png"></th>
        <th data-sort="heal"  class="stat-h" title="Heal"><img src="sprites/spr_iconHeal.png"></th>
        <th data-sort="cost"  class="stat-h" title="Cost"><img src="sprites/spr_coinIcon.png"></th>
        <th data-sort="ability">Ability</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</section>

<section id="potions" class="tab-section">
  <div class="controls">
    <input type="search" id="potions-search" placeholder="Search potions…">
    <div class="count" id="potions-count"></div>
  </div>
  <table id="potions-table">
    <thead><tr><th></th><th data-sort="name">Name</th><th data-sort="key">Key</th><th>Effect</th></tr></thead>
    <tbody></tbody>
  </table>
</section>

<section id="slots" class="tab-section">
  <div class="controls">
    <input type="search" id="slots-search" placeholder="Search slot buffs…">
    <div class="count" id="slots-count"></div>
  </div>
  <table id="slots-table">
    <thead><tr><th></th><th data-sort="name">Name</th><th data-sort="key">Key</th><th>Effect</th></tr></thead>
    <tbody></tbody>
  </table>
</section>

<section id="encounters" class="tab-section">
  <div class="controls">
    <input type="search" id="encounters-search" placeholder="Search encounters…">
    <div class="count" id="encounters-count"></div>
  </div>
  <table id="encounters-table">
    <thead><tr><th data-sort="name">Name</th><th data-sort="key">Key</th><th>Description</th></tr></thead>
    <tbody></tbody>
  </table>
</section>

<div id="item-tooltip"></div>

<footer>
  Generated from <code>data.win</code> binary extraction + locales/en.json. Sprites decoded from QOZ2 textures.
</footer>

const TAGS = ["Arcane", "Crystal", "Dark", "Dragon", "Elven", "Flame", "Frosty", "Holy", "Moon", "Neutral", "Storm", "Witch"];

let state = {
  tier: 3,
  tags: new Set(),     // empty = "All" (no filter)
  search: "",
  sort: { col: "name", dir: "asc" },
};

// ---- Tabs ----
document.querySelectorAll(".tabs button").forEach(b => {
  b.addEventListener("click", () => {
    document.querySelectorAll(".tabs button").forEach(x => x.classList.toggle("active", x === b));
    document.querySelectorAll(".tab-section").forEach(s => s.classList.toggle("active", s.id === b.dataset.tab));
  });
});

// ---- Tier toggle ----
document.querySelectorAll("#tier-toggle button").forEach(b => {
  b.addEventListener("click", () => {
    state.tier = parseInt(b.dataset.tier, 10);
    document.querySelectorAll("#tier-toggle button").forEach(x => x.classList.toggle("active", x === b));
    renderItems();
  });
});

// ---- Tag chips ----
const chipRow = document.getElementById("tag-chips");
const allChip = document.createElement("button");
allChip.className = "chip active";
allChip.textContent = "All";
allChip.dataset.tag = "";
chipRow.appendChild(allChip);
TAGS.forEach(t => {
  const c = document.createElement("button");
  c.className = "chip";
  c.textContent = t;
  c.dataset.tag = t;
  chipRow.appendChild(c);
});
function syncChipUI() {
  const allActive = state.tags.size === 0;
  document.querySelectorAll(".chip").forEach(x => {
    const t = x.dataset.tag;
    if (!t) x.classList.toggle("active", allActive);
    else    x.classList.toggle("active", state.tags.has(t));
  });
  chipRow.classList.toggle("show-all", allActive);
}

chipRow.addEventListener("click", e => {
  if (!e.target.matches(".chip")) return;
  const tag = e.target.dataset.tag;
  const multi = e.ctrlKey || e.metaKey;
  if (!tag) {
    // "All" — always clears selection
    state.tags.clear();
  } else if (multi) {
    // Ctrl/Cmd-click toggles this tag in the selection
    if (state.tags.has(tag)) state.tags.delete(tag);
    else state.tags.add(tag);
  } else {
    // Plain click: select only this tag
    state.tags.clear();
    state.tags.add(tag);
  }
  syncChipUI();
  renderItems();
});
// Initial state: "All" is selected so everything is un-dimmed
chipRow.classList.add("show-all");

// ---- Search / sort ----
document.getElementById("items-search").addEventListener("input", e => {
  state.search = e.target.value.toLowerCase().trim();
  renderItems();
});
document.querySelectorAll("#items-table thead th[data-sort]").forEach(th => {
  th.addEventListener("click", () => {
    const c = th.dataset.sort;
    state.sort = { col: c, dir: state.sort.col === c && state.sort.dir === "asc" ? "desc" : "asc" };
    renderItems();
  });
});

const RARITY_TIPS = {
  special: "Encounter/chest reward — not sold in the regular shop. Often does not follow the standard 1★→4★ progression and may be tied to specific days or events (presents, Treasure Chest, Mimic Rod, Toxins, Home-Brew, Icicle, Jade)."
};
function tagsHTML(tags, rarity, tagSource) {
  // Wiki-fallback tags get a dotted underline and tooltip explaining the source
  // is not the binary (per the "never guess" principle in CLAUDE.md).
  const wikiOnly = tagSource === "wiki_fallback";
  const wikiAttr = wikiOnly ? ' title="From wiki — not in binary item pool. Game-mechanic membership for this item is not in any tag pool."' : "";
  const wikiClass = wikiOnly ? " wiki-only" : "";
  let h = tags.map(t => `<span class="tag ${t}${wikiClass}"${wikiAttr}>${t}</span>`).join("");
  if (rarity) {
    const label = rarity[0].toUpperCase() + rarity.slice(1);
    const tip = RARITY_TIPS[rarity] ? ` title="${RARITY_TIPS[rarity]}"` : "";
    h += `<span class="rarity ${rarity}"${tip}>${label}</span>`;
  }
  return h;
}

function num(v) { return v == null ? `<span class="empty">–</span>` : v; }

function renderItems() {
  let rows = ITEMS;
  if (state.tags.size > 0) {
    rows = rows.filter(r => r.tags.some(t => state.tags.has(t)));
  }
  if (state.search) rows = rows.filter(r => r.name.toLowerCase().includes(state.search) || r.obj.toLowerCase().includes(state.search));

  const t = state.tier;
  const sortKey = state.sort.col;
  const dir = state.sort.dir === "asc" ? 1 : -1;
  rows.sort((a, b) => {
    let av, bv;
    if (["dmg", "cd", "crit", "mc", "ch", "poi", "burn", "bleed", "shock", "block", "heal", "cost"].includes(sortKey)) {
      av = a.tiers[t][sortKey]; bv = b.tiers[t][sortKey];
    } else if (sortKey === "tags") {
      av = a.tags.join(","); bv = b.tags.join(",");
    } else if (sortKey === "ability") {
      av = a.tiers[t].ability || ""; bv = b.tiers[t].ability || "";
    } else {
      av = a[sortKey]; bv = b[sortKey];
    }
    if (av == null && bv == null) return 0;
    if (av == null) return 1;
    if (bv == null) return -1;
    if (typeof av === "number" && typeof bv === "number") return (av - bv) * dir;
    return String(av).localeCompare(String(bv)) * dir;
  });

  document.querySelectorAll("#items-table thead th").forEach(th => {
    th.classList.remove("sorted-asc", "sorted-desc");
    if (th.dataset.sort === sortKey) th.classList.add(state.sort.dir === "asc" ? "sorted-asc" : "sorted-desc");
  });

  const tbody = document.querySelector("#items-table tbody");
  tbody.innerHTML = rows.map(r => {
    const ti = r.tiers[t];
    const sprite = r.sprite ? `<img src="${r.sprite}" loading="lazy">` : `<div class="ph"></div>`;
    return `<tr>
      <td class="icon">${sprite}</td>
      <td class="name" data-item="${r.obj}">${r.name}</td>
      <td class="tags">${tagsHTML(r.tags, r.rarity, r.sources && r.sources.tag_source)}</td>
      <td class="num">${num(ti.dmg)}</td>
      <td class="num">${num(ti.cd)}</td>
      <td class="num">${num(ti.crit)}</td>
      <td class="num">${num(ti.mc)}</td>
      <td class="num">${num(ti.ch)}</td>
      <td class="num">${num(ti.poi)}</td>
      <td class="num">${num(ti.burn)}</td>
      <td class="num">${num(ti.bleed)}</td>
      <td class="num">${num(ti.shock)}</td>
      <td class="num">${num(ti.block)}</td>
      <td class="num">${num(ti.heal)}</td>
      <td class="num cost">${ti.cost != null ? `<img src="sprites/spr_coinIcon.png">${ti.cost}` : '<span class="empty">–</span>'}</td>
      <td class="ability">${ti.ability ? ti.ability.replace(/[<>]/g, c => ({"<":"&lt;",">":"&gt;"}[c])) : '<span class="empty">–</span>'}</td>
    </tr>`;
  }).join("");
  document.getElementById("items-count").textContent = `${rows.length} of ${ITEMS.length} shown`;
}

// ---- Generic table renderer for potions/slots/encounters ----
function renderSimple(tab, rows, cols) {
  const search = document.getElementById(tab + "-search").value.toLowerCase().trim();
  let r = rows;
  if (search) {
    r = r.filter(x => (x.name || "").toLowerCase().includes(search)
                    || (x.key || "").toLowerCase().includes(search)
                    || (x.texts || []).some(t => t.toLowerCase().includes(search)));
  }
  const tbody = document.querySelector(`#${tab}-table tbody`);
  tbody.innerHTML = r.map(x => {
    const sprite = x.sprite ? `<img src="${x.sprite}" loading="lazy">` : `<div class="ph"></div>`;
    const textCell = (x.texts && x.texts.length)
      ? (x.texts.length === 1 ? x.texts[0] : `<ol>${x.texts.map(t => `<li>${t}</li>`).join("")}</ol>`)
      : '<span class="empty">–</span>';
    if (cols === "with-icon") {
      return `<tr><td class="icon">${sprite}</td><td class="name">${x.name || x.key}</td><td class="text-cell"><code>${x.key}</code></td><td class="text-cell">${textCell}</td></tr>`;
    } else {
      return `<tr><td class="name">${x.name || x.key}</td><td class="text-cell"><code>${x.key}</code></td><td class="text-cell">${textCell}</td></tr>`;
    }
  }).join("");
  document.getElementById(tab + "-count").textContent = `${r.length} of ${rows.length} shown`;
}

document.getElementById("potions-search").addEventListener("input", () => renderSimple("potions", POTIONS, "with-icon"));
document.getElementById("slots-search").addEventListener("input", () => renderSimple("slots", SLOTS, "with-icon"));
document.getElementById("encounters-search").addEventListener("input", () => renderSimple("encounters", ENCOUNTERS, "no-icon"));

renderItems();
renderSimple("potions", POTIONS, "with-icon");
renderSimple("slots", SLOTS, "with-icon");
renderSimple("encounters", ENCOUNTERS, "no-icon");

// ---- In-game-style hover tooltip (matches Oaken Tower's item tooltip layout) ----
const ITEMS_BY_OBJ = Object.fromEntries(ITEMS.map(i => [i.obj, i]));
const TOOLTIP = document.getElementById("item-tooltip");
const STAT_ICON = {
  poi: "sprites/spr_iconPoison.png",
  burn: "sprites/spr_iconBurn.png",
  bleed: "sprites/spr_iconBleed.png",
  shock: "sprites/spr_iconShock.png",
  block: "sprites/spr_iconShield.png",
  heal: "sprites/spr_iconHeal.png",
  mc: "sprites/spr_iconMulticast.png",
  ch: "sprites/spr_iconCharges.png",
  crit: "sprites/spr_iconCrit.png",
};

function fmtVal(key, v) {
  if (v == null) return "";
  if (key === "cd") return `${v}s`;
  if (key === "crit") return `${v}%`;
  if (key === "mc") return `+${v}`;
  return v;
}

function renderTooltip(item) {
  const t = item.tiers[state.tier] || {};
  const dmg = t.dmg ?? 0;
  const cd = t.cd != null ? `${t.cd}s` : "—";
  const sword = "sprites/spr_iconCasual2.png";
  const hourglass = "sprites/spr_iconCooldown.png";

  // Secondary stats: only non-zero / non-null. Standard order to match in-game.
  const secondaryOrder = ["poi", "burn", "bleed", "shock", "block", "heal", "ch", "crit", "mc"];
  const secondary = secondaryOrder
    .filter(k => t[k] != null && t[k] !== 0 && t[k] !== "")
    .map(k => `<span class="tt-stat"><img src="${STAT_ICON[k]}" alt="${k}">${fmtVal(k, t[k])}</span>`)
    .join("");

  const ability = (t.ability || "").trim();
  const abilityHtml = ability
    ? `<div class="tt-ability">${ability.replace(/[<>]/g, c => ({"<":"&lt;",">":"&gt;"}[c]))}</div>`
    : `<div class="tt-ability empty">No ability.</div>`;

  // Pills at bottom: weapon type (e.g., "Sword") + tag pills (e.g., "Arcane")
  const pills = [];
  if (item.weapon_type) {
    const wt = item.weapon_type.charAt(0).toUpperCase() + item.weapon_type.slice(1);
    pills.push(`<span class="tt-pill weapon">${wt}</span>`);
  }
  for (const tag of item.tags) {
    pills.push(`<span class="tag ${tag}" style="display:inline-flex;width:78px;height:22px">${tag}</span>`);
  }

  const rarityLabel = item.rarity ? item.rarity.charAt(0).toUpperCase() + item.rarity.slice(1) : "";

  TOOLTIP.innerHTML = `
    <div class="tt-title">${item.name}</div>
    <div class="tt-rarity ${item.rarity}">${rarityLabel}</div>
    <div class="tt-divider"></div>
    <div class="tt-primary">
      <span class="tt-stat"><img src="${hourglass}">${cd}</span>
      <span class="tt-stat"><img src="${sword}">${dmg}</span>
    </div>
    ${secondary ? `<div class="tt-divider"></div><div class="tt-stats">${secondary}</div>` : ""}
    ${abilityHtml}
    ${pills.length ? `<div class="tt-pills">${pills.join("")}</div>` : ""}
  `;
}

function positionTooltip(e) {
  const pad = 16;
  const w = TOOLTIP.offsetWidth, h = TOOLTIP.offsetHeight;
  let x = e.clientX + pad, y = e.clientY + pad;
  if (x + w > window.innerWidth - 8) x = e.clientX - w - pad;
  if (y + h > window.innerHeight - 8) y = e.clientY - h - pad;
  if (y < 8) y = 8;
  TOOLTIP.style.left = x + "px";
  TOOLTIP.style.top = y + "px";
}

document.querySelector("#items-table tbody").addEventListener("mouseover", e => {
  const cell = e.target.closest("td.name[data-item]");
  if (!cell) return;
  const item = ITEMS_BY_OBJ[cell.dataset.item];
  if (!item) return;
  renderTooltip(item);
  TOOLTIP.classList.add("visible");
  positionTooltip(e);
});
document.querySelector("#items-table tbody").addEventListener("mousemove", e => {
  if (TOOLTIP.classList.contains("visible")) positionTooltip(e);
});
document.querySelector("#items-table tbody").addEventListener("mouseout", e => {
  if (!e.relatedTarget || !e.relatedTarget.closest("td.name[data-item]")) {
    TOOLTIP.classList.remove("visible");
  }
});
</script>
</body>
